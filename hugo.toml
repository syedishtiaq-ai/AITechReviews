baseURL = "http://localhost:1313/"
languageCode = "en-us"
title = "AITechReviews"
enableRobotsTXT = true

googleAnalytics = "G-00D58FDB3V"

# Enable tags taxonomy for article archives
taxonomies.tag = "tags"

canonifyURLs = true
enableGitInfo = true

[outputs]
  home = ["HTML", "RSS", "SITEMAP"]
  section = ["HTML", "RSS"]

[outputFormats.JSON]
  name = "json"
  mediaType = "application/json"
  baseName = "search-index"
  isPlainText = true
  notAlternative = true

[sitemap]
  filename = "sitemap.xml"
  changefreq = "weekly"
  priority = 0.7

[params]
  description = "Trusted Buying Guides and gaming insights"
  heroTagline = "Gaming Guides & Product Picks"
  # Configure which top-level sections appear on the homepage and their order.
  # Example: ["Gaming", "Buying Guides"] will show Gaming first, Buying Guides second.
  homepageOrder = ["Gaming", "Buying Guides"]
  # Toggle which main categories appear in the "What are you looking for?" box.
  [params.showOnHome]
    # Set to true/false to show or hide the section on the homepage
    gaming = true
    productReviews = true

