baseURL = "https://aitechreviews.co.in/"
languageCode = "en-us"
title = "AITechReviews"
enableRobotsTXT = true

googleAnalytics = "G-00D58FDB3V"

[outputs]
  home = ["HTML", "RSS", "SITEMAP"]

[sitemap]
  filename = "sitemap.xml"
  changefreq = "weekly"
  priority = 0.5

[params]
  description = "Trusted product reviews and gaming insights"
  heroTagline = "Gaming Guides & Product Picks"
  # Configure which top-level sections appear on the homepage and their order.
  # Example: ["Gaming", "Product Reviews"] will show Gaming first, Product Reviews second.
  homepageOrder = ["Gaming", "Product Reviews"]
  # Toggle which main categories appear in the "What are you looking for?" box.
  [params.showOnHome]
    # Set to true/false to show or hide the section on the homepage
    gaming = true
    productReviews = true

[menus]
  [[menus.main]]
    name = "Home"
    pageRef = "/"
    weight = 10

  [[menus.main]]
    name = "Product Reviews"
    identifier = "product-reviews"
    pageRef = "/product-reviews"
    weight = 20

