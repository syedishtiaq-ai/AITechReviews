{{- /* Social Share Buttons Partial for Articles */ -}}
<div class="share-buttons">
  <p class="share-label">Share this article:</p>
  
  <a 
    href="https://twitter.com/intent/tweet?url={{ .Permalink }}&text={{ .Title }}" 
    target="_blank"
    rel="noopener noreferrer"
    class="share-btn twitter" 
    aria-label="Share on Twitter"
    title="Share on Twitter">
    𝕏
  </a>
  
  <a 
    href="https://www.facebook.com/sharer/sharer.php?u={{ .Permalink }}" 
    target="_blank"
    rel="noopener noreferrer"
    class="share-btn facebook" 
    aria-label="Share on Facebook"
    title="Share on Facebook">
    f
  </a>
  
  <a 
    href="https://www.linkedin.com/sharing/share-offsite/?url={{ .Permalink }}" 
    target="_blank"
    rel="noopener noreferrer"
    class="share-btn linkedin" 
    aria-label="Share on LinkedIn"
    title="Share on LinkedIn">
    in
  </a>
  
  <a 
    href="mailto:?subject={{ .Title }}&body={{ .Permalink }}" 
    class="share-btn email" 
    aria-label="Share via Email"
    title="Share via Email">
    ✉
  </a>
</div>
